steps:
    # Build Docker image with v2 tag
    - name: 'gcr.io/cloud-builders/docker'
      id: 'build images'
      script: |
          docker build \
              --label org.opencontainers.image.source="https://github.com/Wi-flx/mec-mmc-formatter" \
              --label org.opencontainers.image.revision="$COMMIT_SHA" \
              --label org.opencontainers.image.title="wiflix-mec-mmc-formatter-v2" \
              --label org.opencontainers.image.version="2.0" \
              --label org.opencontainers.image.created="$(date -u +"%Y-%m-%dT%H:%M:%SZ")" \
              --label org.opencontainers.image.authors="Wi-flix Eng <tech@wi-flix.com>" \
              -t us-central1-docker.pkg.dev/$PROJECT_ID/wiflix-docker-repo/wiflix-mec-mmc-formatter-v2:latest \
              -t us-central1-docker.pkg.dev/$PROJECT_ID/wiflix-docker-repo/wiflix-mec-mmc-formatter-v2:$SHORT_SHA .
      automapSubstitutions: true

    # Push Docker images (both latest and commit SHA tags)
    - name: 'gcr.io/cloud-builders/docker'
      id: 'push images'
      script: |
          docker push us-central1-docker.pkg.dev/$PROJECT_ID/wiflix-docker-repo/wiflix-mec-mmc-formatter-v2:latest
          docker push us-central1-docker.pkg.dev/$PROJECT_ID/wiflix-docker-repo/wiflix-mec-mmc-formatter-v2:$SHORT_SHA
      automapSubstitutions: true

    # Deploy to Cloud Run with v2 service name
    - name: 'gcr.io/cloud-builders/gcloud'
      id: 'deploy image to cloud run'
      args:
          [
              'run',
              'deploy',
              'wiflix-mec-mmc-formatter-v2',
              '--image',
              'us-central1-docker.pkg.dev/$PROJECT_ID/wiflix-docker-repo/wiflix-mec-mmc-formatter-v2:latest',
              '--region',
              'us-central1',
              '--platform',
              'managed',
              '--allow-unauthenticated',
              '--labels=build-id=$BUILD_ID,version=v2',
              '--tag=v2',
          ]
