                '200':
                    description: Successfully generated MMC XML file
                    headers:
                        Content-Disposition:
                            schema:
                                type: string
                                example: 'attachment; filename="my-movie_mmc.xml"'
                            description: Suggests filename for download
                    content:
                        application/xml:
                            schema:
                                type: string
                                format: xml
                            examples:
