openapi: 3.0.3
info:
    title: Amazon Prime Video XML Generator API
    version: 1.0.0
    description: |
        REST API for generating MovieLabs-compliant MEC (Media Entertainment Core) and MMC (Media Manifest Core) XML files.

        This service provides two approaches for XML generation:

        1. **JSON API** (Recommended): Modern JSON-based endpoints with auto-generation of IDs and intelligent defaults
        2. **CSV Upload** (Legacy): Upload CSV files to generate XML files in bulk

        ## Features

        - **MEC Generation**: Create content metadata XML (title, cast, genres, ratings, release dates)
        - **MMC Generation**: Create technical specification XML (video/audio tracks, subtitles, presentations)
        - **Auto-generation**: Automatically generates IDs, aspect ratios, and other derived fields
        - **Multi-language**: Support for multiple languages and localization
        - **MovieLabs Compliant**: MEC v2.9 and MMC v1.9 specifications

        ## Auto-Generated Fields

        The API intelligently auto-generates various fields to simplify integration:

        ### MEC Auto-Generated:
        - `contentId` - Generated from titleDisplay (slugified)
        - `releaseYear` - Extracted from releaseDate
        - `titleSort` - Removes articles (The, A, An) from titleDisplay
        - `identifier` - Generated from contentId with ORG namespace
        - `originalLanguage` - Defaults to first localizedInfo language code
        - `organization` - Generated from configured organization
        - `companyDisplayCredit` - Capitalized organization name

        ### MMC Auto-Generated:
        - Track IDs (video, audio, subtitle) - Generated from location URL + language
        - Presentation ID, Experience ID, ALID
        - `aspectRatio` - Calculated from heightPixels / widthPixels
        - Video/audio/subtitle linking in presentations

    contact:
        name: WiFlix Support
        url: https://github.com/wi-flix/mec-xml-formatter
    license:
        name: MIT
        url: https://opensource.org/licenses/MIT

servers:
    - url: http://localhost:3000
      description: Development server
    - url: https://api.wiflix.com
      description: Production server (update with your actual URL)

tags:
    - name: XML Generation (JSON API)
      description: Modern JSON-based API endpoints for generating MEC and MMC XML files
    - name: File Upload (CSV)
      description: Legacy CSV upload endpoint for batch XML generation

paths:
    /generate/mec:
        post:
            tags:
                - XML Generation (JSON API)
            summary: Generate MEC XML from JSON
            description: |
                Generate Media Entertainment Core (MEC) XML file from JSON payload. 
                MEC contains content metadata including title, cast, genres, ratings, and release dates.

                The API automatically generates several fields:
                - `contentId` from titleDisplay
                - `releaseYear` from releaseDate
                - `titleSort` by removing articles
                - `identifier` array with ORG namespace
                - `organization` and `companyDisplayCredit`
            operationId: generateMEC
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/GenerateMECDto'
                        examples:
                            minimal:
                                summary: Minimal MEC (IDs auto-generated)
                                value:
                                    localizedInfo:
                                        - language: en-US
                                          titleDisplay: The Matrix
                                          summary190: A computer hacker learns about the true nature of reality.
                                    genre:
                                        - primary: Action
                                          subGenre:
                                              - Sci-Fi
                                    releaseDate: '1999-03-31'
                                    releaseHistory:
                                        - type: Theatrical
                                          country: US
                                          date: '1999-03-31'
                                    workType: movie
                                    cast:
                                        - jobFunction: Actor
                                          billingBlockOrder: '1'
                                          displayName:
                                              en-US: Keanu Reeves
                                        - jobFunction: Director
                                          billingBlockOrder: '2'
                                          displayName:
                                              en-US: The Wachowskis
                            multiLanguage:
                                summary: Multiple Languages
                                value:
                                    localizedInfo:
                                        - language: en-US
                                          titleDisplay: Parasite
                                          summary190: A poor family schemes to become employed by a wealthy family.
                                        - language: ko-KR
                                          titleDisplay: 기생충
                                          summary190: 가난한 가족이 부유한 가족의 집에 취업하려고 계획을 세운다.
                                    genre:
                                        - primary: Drama
                                          subGenre:
                                              - Thriller
                                    releaseDate: '2019-05-30'
                                    releaseHistory:
                                        - type: Theatrical
                                          country: KR
                                          date: '2019-05-30'
                                    workType: movie
                                    cast:
                                        - jobFunction: Actor
                                          billingBlockOrder: '1'
                                          displayName:
                                              en-US: Song Kang-ho
                                              ko-KR: 송강호
                                        - jobFunction: Director
                                          billingBlockOrder: '2'
                                          displayName:
                                              en-US: Bong Joon-ho
                                              ko-KR: 봉준호
                            withRatingsAndCast:
                                summary: With Ratings and Extended Cast
                                value:
                                    localizedInfo:
                                        - language: en-US
                                          titleDisplay: Inception
                                          summary190: A thief who steals corporate secrets through dream-sharing technology.
                                          artReference:
                                              - reference: https://cdn.wiflix.com/inception/cover.jpg
                                                resolution: 1920x1080
                                                purpose: cover
                                    genre:
                                        - primary: Action
                                          subGenre:
                                              - Sci-Fi
                                              - Thriller
                                    releaseDate: '2010-07-16'
                                    releaseHistory:
                                        - type: Theatrical
                                          country: US
                                          date: '2010-07-16'
                                    workType: movie
                                    rating:
                                        - country: US
                                          system: MPAA
                                          value: PG-13
                                        - country: GB
                                          system: BBFC
                                          value: '12A'
                                    cast:
                                        - jobFunction: Actor
                                          billingBlockOrder: '1'
                                          displayName:
                                              en-US: Leonardo DiCaprio
                                        - jobFunction: Actor
                                          billingBlockOrder: '2'
                                          displayName:
                                              en-US: Joseph Gordon-Levitt
                                        - jobFunction: Director
                                          billingBlockOrder: '3'
                                          displayName:
                                              en-US: Christopher Nolan
                            episodicContent:
                                summary: Episodic Content (TV Show Episode)
                                value:
                                    localizedInfo:
                                        - language: en-US
                                          titleDisplay: The Pilot
                                          summary190: The first episode introduces the main characters.
                                    genre:
                                        - primary: Comedy
                                    releaseDate: '2020-01-15'
                                    releaseHistory:
                                        - type: Broadcast
                                          country: US
                                          date: '2020-01-15'
                                    workType: episode
                                    cast:
                                        - jobFunction: Actor
                                          billingBlockOrder: '1'
                                          displayName:
                                              en-US: Jane Doe
                                    category:
                                        type: Episode
                                        sequenceNumber: '1'
                                        parentTitleDisplay: My Comedy Show Season 1
            responses:
                '200':
                    description: Successfully generated MEC XML file
                    headers:
                        Content-Disposition:
                            schema:
                                type: string
                                example: 'attachment; filename="the-matrix_mec.xml"'
                            description: Suggests filename for download
                    content:
                        application/xml:
                            schema:
                                type: string
                                format: xml
                            examples:
                                mecXml:
                                    summary: Sample MEC XML Output
                                    value: |
                                        <?xml version="1.0" encoding="UTF-8"?>
                                        <mdmec:CoreMetadata xmlns:mdmec="http://www.movielabs.com/schema/mdmec/v2.9">
                                          <mdmec:Basic ContentID="md:cid:org:wiflix:the-matrix">
                                            <mdmec:LocalizedInfo language="en-US">
                                              <mdmec:TitleDisplay>The Matrix</mdmec:TitleDisplay>
                                              <mdmec:TitleSort>Matrix</mdmec:TitleSort>
                                            </mdmec:LocalizedInfo>
                                            <mdmec:ReleaseYear>1999</mdmec:ReleaseYear>
                                            <mdmec:WorkType>Movie</mdmec:WorkType>
                                          </mdmec:Basic>
                                        </mdmec:CoreMetadata>
                '400':
                    $ref: '#/components/responses/BadRequest'
                '500':
                    $ref: '#/components/responses/InternalServerError'

    /generate/mmc:
        post:
            tags:
                - XML Generation (JSON API)
            summary: Generate MMC XML from JSON
            description: |
                Generate Media Manifest Core (MMC) XML file from JSON payload. 
                MMC contains technical specifications about media files including video/audio tracks, subtitles, and presentations.

                The API automatically generates several fields:
                - Track IDs (video, audio, subtitle) from location URLs
                - Presentation ID, Experience ID, ALID
                - `aspectRatio` calculated from dimensions
                - Automatic linking of video/audio/subtitle tracks in presentations
            operationId: generateMMC
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/GenerateMMCDto'
                        examples:
                            minimal:
                                summary: Minimal MMC (IDs auto-generated)
                                value:
                                    audio:
                                        - type: stereo
                                          language: en-US
                                          location: https://cdn.wiflix.com/my-movie/audio_en.mp4
                                    video:
                                        - type: primary
                                          language: en-US
                                          location: https://cdn.wiflix.com/my-movie/video.mp4
                                          picture:
                                              heightPixels: '1080'
                                              widthPixels: '1920'
                                    presentation:
                                        - {}
                                    experience:
                                        - type: Movie
                                          subType: Feature
                                    alidExperience:
                                        - {}
                            multipleAudio:
                                summary: Multiple Audio Languages
                                value:
                                    audio:
                                        - type: stereo
                                          language: en-US
                                          location: https://cdn.wiflix.com/my-movie/audio_en.mp4
                                        - type: stereo
                                          language: es-ES
                                          location: https://cdn.wiflix.com/my-movie/audio_es.mp4
                                        - type: '51'
                                          language: en-US
                                          location: https://cdn.wiflix.com/my-movie/audio_en_51.mp4
                                    video:
                                        - type: primary
                                          language: en-US
                                          location: https://cdn.wiflix.com/my-movie/video.mp4
                                          picture:
                                              heightPixels: '1080'
                                              widthPixels: '1920'
                                              progressive: true
                                    presentation:
                                        - {}
                                    experience:
                                        - type: Movie
                                          subType: Feature
                                    alidExperience:
                                        - {}
                            withSubtitlesAndImages:
                                summary: With Subtitles and Images
                                value:
                                    audio:
                                        - type: stereo
                                          language: en-US
                                          location: https://cdn.wiflix.com/my-movie/audio_en.mp4
                                    video:
                                        - type: primary
                                          language: en-US
                                          location: https://cdn.wiflix.com/my-movie/video.mp4
                                          picture:
                                              heightPixels: '2160'
                                              widthPixels: '3840'
                                    subtitle:
                                        - type: open
                                          language: en-US
                                          location: https://cdn.wiflix.com/my-movie/subtitles_en.srt
                                          frameRate: '23.976'
                                          frameRateMultiplier: 1001/1000
                                          frameRateTimeCode: NonDrop
                                    image:
                                        - purpose: Cover
                                          language: en-US
                                          location: https://cdn.wiflix.com/my-movie/cover.jpg
                                        - purpose: Hero
                                          language: en-US
                                          location: https://cdn.wiflix.com/my-movie/hero.jpg
                                    presentation:
                                        - {}
                                    experience:
                                        - type: Movie
                                          subType: Feature
                                    alidExperience:
                                        - {}
                            withExplicitIds:
                                summary: With Explicit IDs (not auto-generated)
                                value:
                                    audio:
                                        - trackId: md:audiotrackid:org:wiflix:custom-audio-1
                                          type: stereo
                                          language: en-US
                                          location: https://cdn.wiflix.com/my-movie/audio_en.mp4
                                          hash: d41d8cd98f00b204e9800998ecf8427e
                                    video:
                                        - trackId: md:vidtrackid:org:wiflix:custom-video-1
                                          type: primary
                                          language: en-US
                                          location: https://cdn.wiflix.com/my-movie/video.mp4
                                          hash: 098f6bcd4621d373cade4e832627b4f6
                                          picture:
                                              heightPixels: '1080'
                                              widthPixels: '1920'
                                              aspectRatio: '16:9'
                                    presentation:
                                        - id: md:presentationid:org:wiflix:custom-presentation-1
                                          trackNum: '0'
                                          videoId: md:vidtrackid:org:wiflix:custom-video-1
                                          audioId: md:audiotrackid:org:wiflix:custom-audio-1
                                    experience:
                                        - id: md:experienceid:org:wiflix:custom-experience-1
                                          type: Movie
                                          subType: Feature
                                    alidExperience:
                                        - alid: md:ALID:org:wiflix:custom-alid-1
                                          experienceId: md:experienceid:org:wiflix:custom-experience-1
                            multipleTracks:
                                summary: Multiple Video and Audio Tracks
